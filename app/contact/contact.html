<!doctype dhtml lib>

<form :is="contact-me" :onsubmit="submit" autocomplete="on">
  <label>
    <span>Your name</span>
    <input type="text" name="name" placeholder="Example: John Doe" required>
  </label>

  <label>
    <span>Your email</span>
    <input type="email" name="email" placeholder="your@email.com" required>
  </label>

  <label>
    <span>Content</span>
    <textarea name="content" placeholder="Type here..."></textarea>
  </label>

  <button>Lets talk!</button>

  <script>
    async submit() {
      const { loadPage } = await import('/@nue/transitions.js')
      loadPage('/contact/thanks')
    }
  </script>
</form>
