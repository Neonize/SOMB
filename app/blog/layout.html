<!doctype html lib>

<header :is="pagehead">
  <h1>{ title }</h1>
  <p>
    <time>{ formatDate(publishedDate || date) }</time>
  </p>

  <script>
    formatDate(date) {
      return new Date(date).toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      })
    }
  </script>
</header>
